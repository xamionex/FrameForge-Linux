name: 💡 Feature Request
description: Suggest an idea or improvement for one of the apps.
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make FrameForge better? Fill out the fields below so we can understand the request clearly.

  - type: textarea
    id: idea
    attributes:
      label: The Idea
      description: Describe the feature or improvement you'd like to see.
      placeholder: What do you want the app to do?
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why Is This Needed?
      description: How does this help you or other users? What problem does it solve?
      placeholder: Explain the use case or pain point this addresses.
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional Context
      description: Screenshots, mockups, links, or anything else that helps explain the idea.
      placeholder: Optional — drag-and-drop images or add links here.
    validations:
      required: false
